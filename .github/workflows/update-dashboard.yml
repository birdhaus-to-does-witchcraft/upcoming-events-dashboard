name: Update Dashboard

on:
  schedule:
    - cron: '0 */2 * * *'  # Every 2 hours
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install git+https://github.com/birdhaus-to-does-witchcraft/bh_pipeline.git

      - name: Generate dashboard
        env:
          WIX_API_KEY: ${{ secrets.WIX_API_KEY }}
          WIX_SITE_ID: ${{ secrets.WIX_SITE_ID }}
          WIX_ACCOUNT_ID: ${{ secrets.WIX_ACCOUNT_ID }}
          GUEST_LIST_PASSWORD: ${{ secrets.GUEST_LIST_PASSWORD }}
        run: python generate.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html data/events.json
          git diff --cached --quiet || git commit -m "Update dashboard data"
          git push
